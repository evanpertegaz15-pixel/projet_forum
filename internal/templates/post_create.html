<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil - Dark Jurassic</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>

<header>
    <header class="banner">
  <img src="static/banner.png" alt="Website Banner">
</header>

<nav>
    <a href="home.html">Accueil</a> 
    <a href="category.html">Catégories</a> 
    <a href="post_create.html">Créer un post</a> 
    <a href="login.html">Connexion</a>
    <a href="register.html">S'inscrire</a>
    <a href="profile.html">Mon profil</a>
</nav>

<main class="center">
    <section class="form-container">
        <h2>Nouveau post</h2>

        <form action="#" method="post">

            <label>Titre :</label>
            <input type="text" name="title" required>

            <label>Catégorie :</label>
            <select name="category" required>
                <option value="">-- Choisir --</option>
                <option value="general">Général</option>
                <option value="dino">Dinosaures</option>
                <option value="theories">Théories</option>
                <option value="news">News</option>
            </select>

            <label>Contenu :</label>
            <textarea name="content" rows="6" required></textarea>

            <button type="submit">Publier</button>
        </form>
    </section>
</main>

<footer>
    <p>© 2026 Dark Jurassic</p>
</footer>

</body>
</html>
